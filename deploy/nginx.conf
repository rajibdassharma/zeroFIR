# Reference nginx config for zeroFIR. Coexists with CyberFraud on the
# same host — either add this as a second server block on a distinct
# hostname (e.g. zerofir.ksp.gov.in) or as a distinct path/prefix.
# Adjust cert paths per environment.

upstream zerofir_backend {
    server 127.0.0.1:8002;
}

server {
    listen 443 ssl http2;
    server_name zerofir.ksp.gov.in;

    ssl_certificate     /etc/letsencrypt/live/zerofir.ksp.gov.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zerofir.ksp.gov.in/privkey.pem;

    # KSWAN-only — access list would be added here in prod.
    # allow 10.0.0.0/8; deny all;

    root /opt/zerofir/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/   { proxy_pass http://zerofir_backend; }
    location /health { proxy_pass http://zerofir_backend; }

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

server {
    listen 80;
    server_name zerofir.ksp.gov.in;
    return 301 https://$host$request_uri;
}
